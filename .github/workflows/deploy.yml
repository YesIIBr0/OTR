name: CI + Deploy (staging VPS)

# Flujo (buenas prácticas):
#  · job "ci": gate en CADA push y PR (typecheck + prisma validate) → nunca se despliega roto.
#  · job "build-and-deploy" (solo push a main / manual): construye la imagen Docker en el
#    runner de GitHub (potente), la publica en ghcr.io (gratis, privado) y el VPS solo la BAJA
#    (no compila en su 1 CPU → deploy rápido y sin presión de recursos en la app en vivo).
#  · Login a ghcr en el VPS con el token EFÍMERO del job (sin PAT extra). Healthcheck que aborta
#    si la app no queda sana. Secretos en GitHub; el host key del VPS está fijado (anti-MITM).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-vps-staging
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Generar cliente Prisma
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./dev.db"
      - name: Validar ambos schemas Prisma
        run: |
          DATABASE_URL="file:./dev.db" npx prisma validate
          DATABASE_URL="postgresql://ci:ci@localhost:5432/ci" npx prisma validate --schema prisma/schema.postgres.prisma
      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

  build-and-deploy:
    needs: ci
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # ---------- Construir la imagen EN EL RUNNER y publicarla en ghcr ----------
      - name: Login a ghcr.io
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build + push (cliente Prisma = Postgres)
        run: |
          cp prisma/schema.postgres.prisma prisma/schema.prisma
          docker build -t ghcr.io/yesiibr0/otr:latest -t "ghcr.io/yesiibr0/otr:${{ github.sha }}" .
          docker push ghcr.io/yesiibr0/otr:latest
          docker push "ghcr.io/yesiibr0/otr:${{ github.sha }}"

      # ---------- Deploy: el VPS solo BAJA la imagen (no construye) ----------
      - name: Preparar SSH (llave + host key fijado)
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts
      - name: Sincronizar compose + scripts al VPS
        run: |
          rsync -az \
            --exclude '.git' --exclude 'node_modules' --exclude '.next' \
            --exclude 'prisma/dev.db' --exclude 'prisma/dev.db-journal' --exclude 'prisma/schema.prisma' \
            --exclude '.env' --exclude '.env.local' --exclude '.env.production' --exclude 'var/uploads' \
            -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts -o IdentitiesOnly=yes" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/otr/"
      - name: Deploy en el VPS (login ghcr efímero + pull + up + healthcheck)
        run: |
          echo "${{ github.token }}" | ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts -o IdentitiesOnly=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'docker login ghcr.io -u "${{ github.actor }}" --password-stdin && bash /opt/otr/scripts/deploy.sh'
